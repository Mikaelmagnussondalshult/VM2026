<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>VM 2026 - PLAYipp skärm</title>
<style>
  :root{--bg:#07111f;--panel:#0e1b2f;--panel2:#122641;--text:#f4f7fb;--muted:#9fb1c8;--accent:#59d38c;--accent2:#6ab7ff;--warn:#ffd166;--bad:#ff6b6b;}
  *{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at top left,#12375e 0,#07111f 46%,#040912 100%);color:var(--text);font-family:Inter,Arial,Helvetica,sans-serif;overflow:hidden;width:100vw;height:100vh}
  .screen{width:100vw;height:100vh;padding:34px;display:grid;grid-template-rows:auto 1fr auto;gap:22px}.top{display:flex;align-items:center;justify-content:space-between}.brand{display:flex;gap:18px;align-items:center}.ball{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#fff,#9dd7ff);display:grid;place-items:center;color:#07111f;font-size:36px;box-shadow:0 0 40px rgba(106,183,255,.25)}h1{font-size:54px;margin:0;letter-spacing:-1px}.sub{color:var(--muted);font-size:21px;margin-top:2px}.clock{text-align:right}.time{font-size:48px;font-weight:800}.date{font-size:20px;color:var(--muted)}.grid{display:grid;grid-template-columns:1.25fr .95fr;gap:22px;min-height:0}.card{background:rgba(14,27,47,.86);border:1px solid rgba(255,255,255,.10);border-radius:30px;box-shadow:0 24px 80px rgba(0,0,0,.22);padding:28px;min-height:0;overflow:hidden}.card h2{font-size:32px;margin:0 0 20px;display:flex;align-items:center;gap:12px}.list{display:flex;flex-direction:column;gap:14px}.match{display:grid;grid-template-columns:95px 1fr auto;gap:18px;align-items:center;background:linear-gradient(90deg,rgba(255,255,255,.075),rgba(255,255,255,.035));border:1px solid rgba(255,255,255,.08);border-radius:22px;padding:18px 20px}.match.live{border-color:rgba(89,211,140,.65);box-shadow:0 0 0 1px rgba(89,211,140,.20),0 0 26px rgba(89,211,140,.12)}.kick{font-size:22px;font-weight:800;color:var(--accent2)}.teams{font-size:25px;font-weight:750;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.meta{font-size:16px;color:var(--muted);margin-top:6px}.score{font-size:30px;font-weight:900;min-width:92px;text-align:center}.pill{font-size:15px;font-weight:800;border-radius:999px;padding:7px 12px;background:rgba(106,183,255,.16);color:#bfe1ff;display:inline-block}.pill.live{background:rgba(89,211,140,.18);color:#9dffbd}.pill.done{background:rgba(255,255,255,.10);color:#fff}.side{display:grid;grid-template-rows:auto 1fr;gap:22px;min-height:0}.countdown{background:linear-gradient(135deg,rgba(89,211,140,.18),rgba(106,183,255,.12));border-radius:26px;padding:24px;border:1px solid rgba(255,255,255,.1)}.count-title{font-size:20px;color:var(--muted)}.count-main{font-size:34px;font-weight:900;margin:8px 0}.count-time{font-size:46px;font-weight:950;color:var(--accent)}.standings{min-height:0}.table{display:grid;gap:8px}.row{display:grid;grid-template-columns:38px 1fr 48px 58px;gap:10px;align-items:center;padding:12px 14px;border-radius:15px;background:rgba(255,255,255,.055);font-size:19px}.row.head{color:var(--muted);font-size:14px;font-weight:800;background:transparent;padding-top:0}.pos{font-weight:900;color:var(--accent2)}.pts{font-weight:950;text-align:center}.gd{text-align:right;color:var(--muted)}.footer{display:flex;justify-content:space-between;align-items:center;color:var(--muted);font-size:16px}.status{display:flex;gap:10px;align-items:center}.dot{width:11px;height:11px;border-radius:50%;background:var(--accent);box-shadow:0 0 15px var(--accent)}.error{color:#ffd166;font-size:19px;line-height:1.4} @media(max-width:1200px){h1{font-size:42px}.grid{grid-template-columns:1fr}.side{display:none}.teams{font-size:21px}.match{grid-template-columns:80px 1fr auto}}
</style>
</head>
<body>
<div class="screen">
  <header class="top"><div class="brand"><div class="ball">⚽</div><div><h1>VM 2026</h1><div class="sub">Matcher, resultat och gruppställning</div></div></div><div class="clock"><div class="time" id="clock">--:--</div><div class="date" id="date">Laddar...</div></div></header>
  <main class="grid"><section class="card"><h2>⚽ Dagens matcher & senaste resultat</h2><div class="list" id="matches"><div class="error">Hämtar VM-data...</div></div></section><aside class="side"><div class="countdown"><div class="count-title">Nästa match</div><div class="count-main" id="nextTitle">Laddar...</div><div class="count-time" id="countdown">--:--:--</div><div class="meta" id="nextMeta"></div></div><section class="card standings"><h2>📊 Gruppställning</h2><div class="table" id="standings"><div class="error">Hämtar tabell...</div></div></section></aside></main>
  <footer class="footer"><div class="status"><span class="dot"></span><span id="source">Automatisk uppdatering var 5:e minut</span></div><div id="updated">Senast uppdaterad: --</div></footer>
</div>
<script>
const API_GAMES='https://worldcup26.ir/get/games';
const API_GROUPS='https://worldcup26.ir/get/groups';
const FALLBACK_FIXTURES='https://www.thestatsapi.com/world-cup/data/fixtures.json';
const REFRESH_MS=5*60*1000;
let allMatches=[], nextMatch=null;
const $=id=>document.getElementById(id);
function pad(n){return String(n).padStart(2,'0')}
function now(){return new Date()}
function fmtTime(d){return new Intl.DateTimeFormat('sv-SE',{hour:'2-digit',minute:'2-digit'}).format(d)}
function fmtDate(d){return new Intl.DateTimeFormat('sv-SE',{weekday:'long',day:'numeric',month:'long'}).format(d)}
function tick(){const d=now(); $('clock').textContent=fmtTime(d); $('date').textContent=fmtDate(d); if(nextMatch){let diff=Math.max(0,nextMatch.date-d); let h=Math.floor(diff/36e5),m=Math.floor(diff%36e5/6e4),s=Math.floor(diff%6e4/1000); $('countdown').textContent=`${pad(h)}:${pad(m)}:${pad(s)}`}}
setInterval(tick,1000); tick();
function val(o,keys){for(const k of keys){if(o&&o[k]!=null&&o[k]!=='')return o[k]}return null}
function normGame(g){let home=val(g,['homeTeam','home_team','home','team1','homeName'])||val(g.homeTeam,['name','en'])||'TBD';let away=val(g,['awayTeam','away_team','away','team2','awayName'])||val(g.awayTeam,['name','en'])||'TBD';let iso=val(g,['kickoffUtc','kickoff_utc','dateTime','datetime','time','startTime','start_time']); if(!iso&&g.date) iso=g.date+(g.kickoff?('T'+g.kickoff):'T12:00:00Z'); let d=new Date(iso); if(isNaN(d)) d=new Date(g.date||Date.now()); let hs=val(g,['homeScore','home_score','scoreHome','homeGoals']); let as=val(g,['awayScore','away_score','scoreAway','awayGoals']); let status=String(val(g,['status','matchStatus','state'])||'scheduled').toLowerCase(); let group=val(g,['group','stage'])||''; let stadium=val(g,['stadium','venue'])||''; return {home,away,date:d,hs,as,status,group,stadium,raw:g}}
async function fetchJson(url){const r=await fetch(url,{cache:'no-store'}); if(!r.ok) throw new Error(url+' '+r.status); return r.json()}
async function load(){let source='Live API'; try{let data=await fetchJson(API_GAMES); let arr=Array.isArray(data)?data:(data.games||data.matches||data.data||[]); allMatches=arr.map(normGame).filter(x=>x.date)}catch(e){source='Schema-data (ej livescore)'; let data=await fetchJson(FALLBACK_FIXTURES); allMatches=(data.fixtures||[]).map(normGame)} allMatches.sort((a,b)=>a.date-b.date); renderMatches(); loadGroups().catch(()=>renderFallbackStandings()); $('source').textContent=source+' • uppdateras var 5:e minut'; $('updated').textContent='Senast uppdaterad: '+fmtTime(now());}
function renderMatches(){const n=now(); const start=new Date(n); start.setHours(0,0,0,0); const end=new Date(start); end.setDate(end.getDate()+1); let todays=allMatches.filter(m=>m.date>=start&&m.date<end); let recent=allMatches.filter(m=>m.date<n).slice(-3); let upcoming=allMatches.filter(m=>m.date>=n).slice(0,5); let list=[...new Map([...todays,...recent,...upcoming].map(m=>[m.home+m.away+m.date,m])).values()].slice(0,8); nextMatch=upcoming[0]||null; if(nextMatch){$('nextTitle').textContent=nextMatch.home+' – '+nextMatch.away; $('nextMeta').textContent=fmtDate(nextMatch.date)+' kl. '+fmtTime(nextMatch.date)+(nextMatch.stadium?' • '+nextMatch.stadium:'')} const html=list.map(m=>{const live=m.status.includes('live')||m.status.includes('playing'); const done=m.status.includes('finish')||m.status.includes('complete')||m.status.includes('ended')||m.date<new Date(Date.now()-2*3600000)&&m.hs!=null; const score=(m.hs!=null&&m.as!=null)?`${m.hs}–${m.as}`:fmtTime(m.date); return `<div class="match ${live?'live':''}"><div><div class="kick">${fmtTime(m.date)}</div><div class="meta">${m.group||''}</div></div><div><div class="teams">${m.home} – ${m.away}</div><div class="meta">${fmtDate(m.date)}${m.stadium?' • '+m.stadium:''}</div></div><div><div class="score">${score}</div><span class="pill ${live?'live':done?'done':''}">${live?'LIVE':done?'KLAR':'KOMMANDE'}</span></div></div>`}).join(''); $('matches').innerHTML=html||'<div class="error">Inga matcher hittades just nu.</div>'}
async function loadGroups(){let data=await fetchJson(API_GROUPS); let groups=Array.isArray(data)?data:(data.groups||data.data||[]); let g=groups[0]||{}; let teams=g.teams||g.table||g.standings||[]; if(!teams.length) throw new Error('no groups'); renderStandings((g.name||g.group||'A'),teams)}
function teamName(t){return val(t,['name','team','country','teamName'])||val(t.team,['name'])||'Lag'}
function renderStandings(group,teams){$('standings').innerHTML=`<div class="row head"><div>#</div><div>Grupp ${group}</div><div>Poäng</div><div>MS</div></div>`+teams.slice(0,4).map((t,i)=>`<div class="row"><div class="pos">${i+1}</div><div>${teamName(t)}</div><div class="pts">${val(t,['points','pts'])||0}</div><div class="gd">${val(t,['goalDifference','gd','played','mp'])||0}</div></div>`).join('')}
function renderFallbackStandings(){let groups={}; allMatches.forEach(m=>{if(m.group&&/^[A-L]$/.test(String(m.group))) {groups[m.group]=groups[m.group]||new Set(); groups[m.group].add(m.home); groups[m.group].add(m.away)}}); let key=Object.keys(groups)[0]; if(!key){$('standings').innerHTML='<div class="error">Tabell kunde inte hämtas.</div>'; return} let teams=[...groups[key]].slice(0,4).map(name=>({name,points:0,played:0})); renderStandings(key,teams)}
load(); setInterval(load,REFRESH_MS);
</script>
</body>
</html>
