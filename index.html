<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VM 2026 - PLAYipp</title>
<style>
:root{
  --bg:#07111f; --bg2:#0b1930; --panel:#0f2139; --panel2:#132943;
  --line:rgba(255,255,255,.12); --text:#f5f8ff; --muted:#a9c9ec;
  --blue:#64b8ff; --green:#55e3a4; --red:#ff6b6b; --yellow:#ffd166;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden}
body{
  font-family:Arial,Helvetica,sans-serif;color:var(--text);
  background:
    radial-gradient(circle at 10% 8%,rgba(54,137,218,.34),transparent 30%),
    radial-gradient(circle at 92% 18%,rgba(42,225,168,.16),transparent 28%),
    linear-gradient(135deg,#07111f,#081526 60%,#040b14);
}
.page{width:100vw;height:100vh;padding:34px 38px 26px;display:grid;grid-template-rows:106px 1fr 34px;gap:20px}
header{display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:22px}
.logo{width:72px;height:72px;border-radius:50%;display:grid;place-items:center;font-size:38px;background:linear-gradient(135deg,#e9f7ff,#86c8ff);box-shadow:0 18px 55px rgba(100,184,255,.22)}
h1{margin:0;font-size:55px;letter-spacing:.5px;line-height:.9}
.sub{font-size:24px;color:var(--muted);margin-top:12px}
.clock{text-align:right}.time{font-size:58px;font-weight:900;line-height:1}.date{font-size:22px;color:var(--muted);margin-top:10px}
main{min-height:0;display:grid;grid-template-columns:1.15fr .85fr;gap:24px}
.panel{min-height:0;background:rgba(15,33,57,.92);border:1px solid var(--line);border-radius:30px;box-shadow:0 25px 80px rgba(0,0,0,.32);overflow:hidden;display:flex;flex-direction:column}
.panelHead{padding:24px 28px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.title{font-size:30px;font-weight:900;display:flex;align-items:center;gap:12px}
.badge{background:rgba(85,227,164,.16);border:1px solid rgba(85,227,164,.40);color:#b9ffe2;border-radius:999px;padding:9px 14px;font-size:15px;font-weight:900}
.content{padding:18px 22px;min-height:0;overflow:hidden;flex:1}
.leftGrid{display:grid;grid-template-rows:1fr 270px;gap:18px;min-height:0}
.side{display:grid;grid-template-rows:250px 1fr;gap:24px;min-height:0}
.matchList{display:flex;flex-direction:column;gap:12px;overflow:hidden}
.match{background:linear-gradient(90deg,rgba(255,255,255,.06),rgba(255,255,255,.025));border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:15px 18px;display:grid;grid-template-columns:98px 1fr 110px;gap:14px;align-items:center;min-height:80px}
.mtime{color:var(--blue);font-weight:900;font-size:24px}.mdate{font-size:14px;color:var(--muted);margin-top:4px}
.teams{font-size:23px;font-weight:800;line-height:1.25}.meta{font-size:15px;color:var(--muted);margin-top:5px}
.score{text-align:right;font-size:30px;font-weight:950}.status{font-size:13px;color:#0a1726;background:#d9eaff;border-radius:999px;padding:6px 9px;font-weight:900;display:inline-block;margin-top:5px}
.live .status{background:var(--red);color:white}.finished .status{background:#d8e8ff;color:#0a1726}.scheduled .status{background:rgba(100,184,255,.16);color:#cce9ff;border:1px solid rgba(100,184,255,.25)}
.nextCard{padding:30px;background:linear-gradient(135deg,rgba(22,76,74,.96),rgba(15,33,57,.88));border-color:rgba(85,227,164,.25)}
.label{font-size:21px;color:var(--muted);margin-bottom:12px}.big{font-size:33px;font-weight:950;line-height:1.16}.count{font-size:25px;color:var(--green);font-weight:900;margin-top:18px}
.table{width:100%;border-collapse:separate;border-spacing:0 8px;font-size:18px}
.table th{color:var(--muted);font-size:14px;text-align:left;padding:0 10px 6px}.table td{background:rgba(255,255,255,.055);padding:10px;border-top:1px solid rgba(255,255,255,.03);border-bottom:1px solid rgba(255,255,255,.03)}
.table tr td:first-child{border-radius:13px 0 0 13px;color:var(--blue);font-weight:900;width:40px}.table tr td:last-child{border-radius:0 13px 13px 0;text-align:right}
.team{font-weight:800}.pts{font-weight:950;color:#fff}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}.tab{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.09);color:var(--muted);border-radius:999px;padding:6px 10px;font-size:13px;font-weight:900}.tab.active{background:rgba(100,184,255,.20);color:#fff;border-color:rgba(100,184,255,.35)}
.results{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;overflow:hidden}.result{background:rgba(255,255,255,.055);border-radius:16px;padding:14px;border:1px solid rgba(255,255,255,.06)}.rscore{font-size:25px;font-weight:950}.rteams{font-size:17px;font-weight:800;margin-top:6px}.rmeta{font-size:13px;color:var(--muted);margin-top:5px}
.footer{display:flex;justify-content:space-between;align-items:center;color:var(--muted);font-size:17px}.dot{width:12px;height:12px;border-radius:50%;background:var(--green);box-shadow:0 0 18px var(--green);display:inline-block;margin-right:10px}.err{color:#ffd6d6}.loading{font-size:28px;color:var(--muted);padding:30px}
@media(max-width:1200px){body{overflow:auto}.page{height:auto;min-height:100vh}main{grid-template-columns:1fr}.side{grid-template-rows:auto 650px}h1{font-size:42px}.time{font-size:42px}}
</style>
</head>
<body>
<div class="page">
  <header>
    <div class="brand"><div class="logo">⚽</div><div><h1>VM 2026</h1><div class="sub">Matcher, resultat och gruppställning</div></div></div>
    <div class="clock"><div class="time" id="clock">--:--</div><div class="date" id="date">laddar...</div></div>
  </header>

  <main>
    <div class="leftGrid">
      <section class="panel">
        <div class="panelHead"><div class="title">⚽ Matcher & resultat</div><div class="badge" id="apiStatus">HÄMTAR DATA</div></div>
        <div class="content"><div id="matches" class="matchList"><div class="loading">Laddar matcher...</div></div></div>
      </section>
      <section class="panel">
        <div class="panelHead"><div class="title">✅ Senaste resultat</div></div>
        <div class="content"><div id="results" class="results"></div></div>
      </section>
    </div>

    <div class="side">
      <section class="panel nextCard">
        <div class="label">Nästa match</div>
        <div class="big" id="nextMatch">Laddar...</div>
        <div class="count" id="countdown">--</div>
      </section>
      <section class="panel">
        <div class="panelHead"><div class="title">📊 Gruppställning</div></div>
        <div class="content">
          <div class="tabs" id="tabs"></div>
          <table class="table"><thead><tr><th>#</th><th>Lag</th><th>MS</th><th>+/-</th><th>Poäng</th></tr></thead><tbody id="standings"></tbody></table>
        </div>
      </section>
    </div>
  </main>

  <footer class="footer">
    <div><span class="dot"></span><span id="source">Live API - uppdateras varje minut</span></div>
    <div id="updated">Senast uppdaterad: --:--</div>
  </footer>
</div>

<script>
const API_BASE = "https://worldcup26.ir/get";
const REFRESH_MS = 60000;

const fallbackTeams = {
  "A":["Mexico","South Africa","South Korea","Czechia"], "B":["Canada","Switzerland","Qatar","Bosnia and Herzegovina"],
  "C":["Brazil","Morocco","Haiti","Scotland"], "D":["United States","Paraguay","Australia","Turkey"],
  "E":["Germany","Curacao","Ivory Coast","Ecuador"], "F":["Netherlands","Japan","Sweden","Tunisia"],
  "G":["Belgium","Egypt","Iran","New Zealand"], "H":["Spain","Cape Verde","Saudi Arabia","Uruguay"],
  "I":["France","Senegal","Iraq","Norway"], "J":["Argentina","Algeria","Austria","Jordan"],
  "K":["Portugal","DR Congo","Uzbekistan","Colombia"], "L":["England","Croatia","Ghana","Panama"]
};
const fallbackMatches = [
  ["2026-06-25T22:00:00+02:00","Curacao","Ivory Coast","Group E"],["2026-06-25T22:00:00+02:00","Ecuador","Germany","Group E"],
  ["2026-06-26T01:00:00+02:00","Japan","Sweden","Group F"],["2026-06-26T01:00:00+02:00","Tunisia","Netherlands","Group F"],
  ["2026-06-26T04:00:00+02:00","Turkey","United States","Group D"],["2026-06-26T04:00:00+02:00","Paraguay","Australia","Group D"],
  ["2026-06-26T21:00:00+02:00","Norway","France","Group I"],["2026-06-26T21:00:00+02:00","Senegal","Iraq","Group I"],
  ["2026-06-27T02:00:00+02:00","Uruguay","Spain","Group H"],["2026-06-27T02:00:00+02:00","Cape Verde","Saudi Arabia","Group H"],
  ["2026-06-27T05:00:00+02:00","New Zealand","Belgium","Group G"],["2026-06-27T05:00:00+02:00","Egypt","Iran","Group G"]
].map((m,i)=>({id:i,date:m[0],home:m[1],away:m[2],group:m[3],status:"scheduled",homeScore:null,awayScore:null}));

let allMatches = [], groups = {}, activeGroup = "A", lastNext = null;

function tick(){
  const now = new Date();
  clock.textContent = now.toLocaleTimeString("sv-SE",{hour:"2-digit",minute:"2-digit"});
  date.textContent = now.toLocaleDateString("sv-SE",{weekday:"long",day:"numeric",month:"long"});
  if(lastNext){
    const diff = new Date(lastNext.date) - now;
    if(diff>0){
      const h = Math.floor(diff/36e5), m = Math.floor((diff%36e5)/6e4);
      countdown.textContent = "Startar om " + h + " tim " + m + " min";
    }
  }
}
setInterval(tick,10000); tick();

async function fetchJson(url){
  const r = await fetch(url, {cache:"no-store"});
  if(!r.ok) throw new Error("HTTP " + r.status);
  return await r.json();
}
function arr(x){ return Array.isArray(x) ? x : (x && Array.isArray(x.data) ? x.data : (x && Array.isArray(x.games) ? x.games : (x && Array.isArray(x.groups) ? x.groups : []))); }
function val(o, keys, def=""){ for(const k of keys){ if(o && o[k] !== undefined && o[k] !== null) return o[k]; } return def; }
function nameOf(x){ if(!x) return ""; if(typeof x==="string") return x; return val(x,["name_en","name","team_name","country","title"],""); }
function normalizeMatch(g,i){
  const homeObj = val(g,["homeTeam","home_team","team1","home","homeTeamId"],null);
  const awayObj = val(g,["awayTeam","away_team","team2","away","awayTeamId"],null);
  const home = nameOf(homeObj) || val(g,["home_team_name","homeName","team1_name","homeTeamName"],"TBD");
  const away = nameOf(awayObj) || val(g,["away_team_name","awayName","team2_name","awayTeamName"],"TBD");
  const d = val(g,["date","datetime","kickoff","matchDate","local_date","time"],"");
  const statusRaw = String(val(g,["status","match_status","state"],"scheduled")).toLowerCase();
  const hs = val(g,["homeScore","home_score","score1","home_goals","team1_score"],null);
  const as = val(g,["awayScore","away_score","score2","away_goals","team2_score"],null);
  let status = statusRaw.includes("finish") || statusRaw.includes("complete") || statusRaw==="ft" ? "finished" : statusRaw.includes("live") || statusRaw.includes("playing") ? "live" : "scheduled";
  return {id:val(g,["id","_id","match_id"],i), date:d || fallbackMatches[i%fallbackMatches.length].date, home, away, group:val(g,["group","stage","round"],""), status, homeScore:hs, awayScore:as, venue: nameOf(val(g,["stadium","venue"],null)) || val(g,["stadium_name","venue_name"],"")};
}
function buildFallbackGroups(){
  const out={}; Object.entries(fallbackTeams).forEach(([g,teams])=>out[g]=teams.map((t,i)=>({team:t,played:0,gd:0,pts:0,rank:i+1}))); return out;
}
function normalizeGroups(raw){
  const out = {};
  const rows = arr(raw);
  if(!rows.length) return buildFallbackGroups();
  rows.forEach((g,idx)=>{
    const letter = String(val(g,["letter","name","group","group_name"],String.fromCharCode(65+idx))).replace(/Group/i,"").trim().slice(-1).toUpperCase();
    const teams = arr(val(g,["teams","standings","table"],[]));
    out[letter] = teams.length ? teams.map((t,i)=>({
      team:nameOf(val(t,["team"],t)) || "Lag",
      played:Number(val(t,["played","matches_played","mp","p"],0)),
      gd:Number(val(t,["goalDifference","goal_difference","gd"],0)),
      pts:Number(val(t,["points","pts"],0)),
      rank:Number(val(t,["rank","position"],i+1))
    })) : (fallbackTeams[letter]||[]).map((t,i)=>({team:t,played:0,gd:0,pts:0,rank:i+1}));
  });
  return Object.keys(out).length ? out : buildFallbackGroups();
}
function fmtDate(d){
  const dt = new Date(d); if(isNaN(dt)) return "";
  return dt.toLocaleDateString("sv-SE",{weekday:"short",day:"numeric",month:"short"});
}
function fmtTime(d){
  const dt = new Date(d); if(isNaN(dt)) return "--:--";
  return dt.toLocaleTimeString("sv-SE",{hour:"2-digit",minute:"2-digit"});
}
function renderMatches(){
  const now = new Date();
  const sorted = allMatches.slice().sort((a,b)=>new Date(a.date)-new Date(b.date));
  const upcoming = sorted.filter(m=>m.status==="live" || m.status==="scheduled" || new Date(m.date)>now).slice(0,8);
  const list = upcoming.length ? upcoming : sorted.slice(-8);
  matches.innerHTML = list.map(m=>{
    const score = (m.homeScore!==null && m.awayScore!==null && m.homeScore!=="" && m.awayScore!=="") ? `${m.homeScore}–${m.awayScore}` : "–";
    const st = m.status==="live" ? "LIVE" : m.status==="finished" ? "KLAR" : "KOMMANDE";
    return `<div class="match ${m.status}">
      <div><div class="mtime">${fmtTime(m.date)}</div><div class="mdate">${fmtDate(m.date)}</div></div>
      <div><div class="teams">${m.home} – ${m.away}</div><div class="meta">${m.group || ""}${m.venue ? " · " + m.venue : ""}</div></div>
      <div><div class="score">${score}</div><span class="status">${st}</span></div>
    </div>`;
  }).join("");
  lastNext = sorted.find(m=>new Date(m.date)>now && m.status!=="finished") || sorted[0];
  nextMatch.textContent = lastNext ? `${lastNext.home} – ${lastNext.away}` : "Ingen kommande match";
}
function renderResults(){
  const finished = allMatches.filter(m=>m.status==="finished" || (m.homeScore!==null && m.awayScore!==null)).sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,6);
  results.innerHTML = finished.length ? finished.map(m=>`<div class="result"><div class="rscore">${m.homeScore ?? 0}–${m.awayScore ?? 0}</div><div class="rteams">${m.home} – ${m.away}</div><div class="rmeta">${fmtDate(m.date)} · ${m.group || ""}</div></div>`).join("") : `<div class="result"><div class="rscore">Inga resultat ännu</div><div class="rmeta">Visas automatiskt när matcherna spelas.</div></div>`;
}
function renderTabs(){
  tabs.innerHTML = Object.keys(groups).sort().map(g=>`<button class="tab ${g===activeGroup?"active":""}" onclick="activeGroup='${g}';renderStandings()">${g}</button>`).join("");
}
function renderStandings(){
  renderTabs();
  const rows = (groups[activeGroup] || []).slice().sort((a,b)=>(b.pts-a.pts)||(b.gd-a.gd)||(a.rank-b.rank));
  standings.innerHTML = rows.map((r,i)=>`<tr><td>${i+1}</td><td class="team">${r.team}</td><td>${r.played}</td><td>${r.gd}</td><td class="pts">${r.pts}</td></tr>`).join("");
}
async function load(){
  try{
    apiStatus.textContent = "LIVE API";
    apiStatus.className = "badge";
    const [gamesRaw, groupsRaw] = await Promise.all([
      fetchJson(API_BASE + "/games"),
      fetchJson(API_BASE + "/groups")
    ]);
    allMatches = arr(gamesRaw).map(normalizeMatch);
    if(!allMatches.length) allMatches = fallbackMatches;
    groups = normalizeGroups(groupsRaw);
    source.textContent = "Live API från worldcup26.ir - uppdateras varje minut";
  }catch(e){
    apiStatus.textContent = "FALLBACK";
    source.innerHTML = '<span class="err">API kunde inte nås just nu - visar inbyggt schema tills anslutningen fungerar</span>';
    allMatches = fallbackMatches;
    groups = buildFallbackGroups();
  }
  renderMatches(); renderResults(); renderStandings(); tick();
  updated.textContent = "Senast uppdaterad: " + new Date().toLocaleTimeString("sv-SE",{hour:"2-digit",minute:"2-digit"});
}
load();
setInterval(load, REFRESH_MS);
</script>
</body>
</html>
