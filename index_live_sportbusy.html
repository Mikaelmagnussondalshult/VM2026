<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta http-equiv="refresh" content="1800">
  <title>VM 2026 - Matcher och resultat</title>
  <style>
    :root{
      --bg:#06111f;
      --card:#0d1b2e;
      --card2:#10243c;
      --line:rgba(255,255,255,.12);
      --text:#f5f8ff;
      --muted:#9fc2ea;
      --accent:#66b7ff;
      --green:#50e0a4;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{
      font-family:Arial,Helvetica,sans-serif;
      background:
        radial-gradient(circle at 10% 10%, rgba(30,116,190,.35), transparent 34%),
        radial-gradient(circle at 90% 20%, rgba(0,180,150,.18), transparent 28%),
        var(--bg);
      color:var(--text);
      overflow:hidden;
    }
    .page{
      width:100vw;
      height:100vh;
      padding:34px 38px 28px;
      display:grid;
      grid-template-rows:105px 1fr 32px;
      gap:22px;
    }
    header{
      display:flex;
      align-items:center;
      justify-content:space-between;
    }
    .brand{display:flex;align-items:center;gap:22px}
    .logo{
      width:70px;height:70px;border-radius:50%;
      display:grid;place-items:center;
      background:linear-gradient(135deg,#e8f4ff,#8ecbff);
      color:#08223c;font-size:38px;
      box-shadow:0 12px 40px rgba(102,183,255,.28);
    }
    h1{margin:0;font-size:54px;letter-spacing:.5px;line-height:.9}
    .sub{margin-top:10px;color:var(--muted);font-size:24px}
    .clock{text-align:right}
    #time{font-size:58px;font-weight:800;line-height:1}
    #date{font-size:22px;color:var(--muted);margin-top:8px}
    main{
      display:grid;
      grid-template-columns: 1.45fr .9fr;
      gap:26px;
      min-height:0;
    }
    .panel{
      background:rgba(13,27,46,.88);
      border:1px solid var(--line);
      border-radius:30px;
      box-shadow:0 24px 80px rgba(0,0,0,.28);
      overflow:hidden;
      min-height:0;
      display:flex;
      flex-direction:column;
    }
    .panel-head{
      padding:24px 28px 18px;
      display:flex;align-items:center;justify-content:space-between;
      border-bottom:1px solid var(--line);
    }
    .panel-title{
      font-size:30px;font-weight:800;
      display:flex;align-items:center;gap:12px;
    }
    .pill{
      color:#031423;background:var(--green);
      font-size:15px;font-weight:800;
      padding:8px 12px;border-radius:999px;
      box-shadow:0 0 22px rgba(80,224,164,.25);
    }
    .iframe-wrap{flex:1;min-height:0;padding:12px}
    iframe{
      width:100%;
      height:100%;
      border:0;
      border-radius:22px;
      background:#081728;
    }
    .side{display:grid;grid-template-rows:.58fr 1fr;gap:26px;min-height:0}
    .info{
      padding:30px;
      background:linear-gradient(135deg,rgba(22,70,73,.96),rgba(13,27,46,.92));
      border:1px solid rgba(80,224,164,.20);
    }
    .label{font-size:20px;color:var(--muted);margin-bottom:12px}
    .big{font-size:34px;font-weight:900;line-height:1.15}
    .dots{margin-top:28px;color:var(--green);font-size:38px;letter-spacing:4px}
    .footer{
      display:flex;align-items:center;justify-content:space-between;
      color:var(--muted);font-size:17px;
    }
    .status{display:flex;align-items:center;gap:10px}
    .dot{width:12px;height:12px;border-radius:50%;background:var(--green);box-shadow:0 0 18px var(--green)}
    @media (max-width:1200px){
      body{overflow:auto}
      .page{height:auto;min-height:100vh}
      main{grid-template-columns:1fr}
      .side{grid-template-rows:auto 650px}
      h1{font-size:42px}
      #time{font-size:42px}
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div class="brand">
        <div class="logo">⚽</div>
        <div>
          <h1>VM 2026</h1>
          <div class="sub">Matcher, resultat och uppdaterade fixtures</div>
        </div>
      </div>
      <div class="clock">
        <div id="time">--:--</div>
        <div id="date">laddar...</div>
      </div>
    </header>

    <main>
      <section class="panel">
        <div class="panel-head">
          <div class="panel-title">⚽ Matcher & resultat</div>
          <div class="pill">AUTO-UPPDATERAS</div>
        </div>
        <div class="iframe-wrap">
          <iframe
            src="https://www.sportbusy.com/embed/world-cup?theme=dark&compact=1"
            title="VM 2026 matcher och resultat"
            loading="eager"
            referrerpolicy="no-referrer-when-downgrade">
          </iframe>
        </div>
      </section>

      <div class="side">
        <section class="panel info">
          <div class="label">Status</div>
          <div class="big">Live-data från SportBusy</div>
          <div class="dots">▪▪ ▪▪▪ ▪▪</div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <div class="panel-title">📊 Grupp / tabell</div>
          </div>
          <div class="iframe-wrap">
            <iframe
              src="https://www.sportbusy.com/embed/world-cup?theme=dark"
              title="VM 2026 gruppställning och fixtures"
              loading="eager"
              referrerpolicy="no-referrer-when-downgrade">
            </iframe>
          </div>
        </section>
      </div>
    </main>

    <footer class="footer">
      <div class="status"><span class="dot"></span> Uppdateras automatiskt av widgeten. Sidan laddas om var 30:e minut.</div>
      <div id="updated">Senast öppnad: --:--</div>
    </footer>
  </div>

  <script>
    function updateClock(){
      const now = new Date();
      document.getElementById('time').textContent = now.toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'});
      document.getElementById('date').textContent = now.toLocaleDateString('sv-SE',{weekday:'long',day:'numeric',month:'long'});
      document.getElementById('updated').textContent = 'Senast öppnad: ' + now.toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'});
    }
    updateClock();
    setInterval(updateClock, 10000);
  </script>
</body>
</html>
